<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LetterMatch</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#9993;</text></svg>">
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 antialiased select-none">

    <div id="lobby" class="vintage-card w-full max-w-sm p-10 text-center">
        <h1 class="vintage-display text-4xl mb-1">LetterMatch</h1>
        <p class="vintage-text-muted text-xs tracking-widest uppercase mb-8">A word game for two</p>
        
        <button id="btn-create" class="vintage-btn-primary w-full py-3 text-sm mb-2">Create Room</button>
        
        <div class="flex items-center gap-3 my-5">
            <hr class="vintage-divider flex-1">
            <span class="vintage-text-muted text-xs tracking-widest">OR</span>
            <hr class="vintage-divider flex-1">
        </div>
        
        <input type="number" id="input-join" placeholder="4-digit code" class="vintage-input w-full py-3 px-5 text-center text-sm tracking-[0.3em] mb-2">
        <button id="btn-join" class="vintage-btn-secondary w-full py-3 text-sm">Join Room</button>
        
        <p id="lobby-msg" class="text-red-700 mt-4 text-xs h-4"></p>
    </div>

    <div id="game-ui" class="hidden vintage-card w-full max-w-sm p-6 text-center flex flex-col h-[80vh] justify-between">
        <div class="vintage-score-box rounded p-4">
            <div class="flex justify-between items-center">
                <div class="text-left">
                    <p class="vintage-label text-[10px] uppercase">You</p>
                    <p id="score-you" class="vintage-display text-3xl">0</p>
                </div>
                <div class="text-center">
                    <p class="vintage-label text-[10px] uppercase">Round</p>
                    <p id="round-display" class="vintage-display text-lg">1/10</p>
                    <p id="room-display" class="vintage-text-muted text-[10px] tracking-widest mt-1">----</p>
                </div>
                <div class="text-right">
                    <p class="vintage-label text-[10px] uppercase">Them</p>
                    <p id="score-them" class="vintage-display text-3xl">0</p>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center py-6">
            <div id="status-text" class="vintage-display text-xl mb-4 animate-fade">Waiting for partner...</div>
            <div id="letter-display" class="vintage-display text-7xl transition-transform scale-0 opacity-0 mb-4 h-20 flex items-center justify-center">?</div>
            <div id="timer-bar" class="vintage-input w-full h-1 hidden overflow-hidden"><div id="timer-fill" class="h-full bg-[#5c4a32] w-full transition-all duration-1000 linear"></div></div>
        </div>

        <div class="mt-auto">
            <div id="keypad-area" class="hidden flex flex-wrap justify-center gap-2 mb-4"></div>

            <div id="input-group">
                <input type="text" id="word-input" autocomplete="off" autocorrect="off" spellcheck="false" onpaste="return false;" class="vintage-input w-full py-3 px-5 text-center text-sm mb-2 disabled:opacity-50" placeholder="Type here..." disabled>
                <button id="btn-submit" class="vintage-btn-primary w-full py-3 text-sm disabled:opacity-50" disabled>SUBMIT</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js?v=2"></script>
</body>
</html>
